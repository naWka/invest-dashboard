name: Update ETF Prices

on:
  schedule:
    # Каждый рабочий день в 17:00 UTC (20:00 MSK) — после закрытия LSE
    - cron: '0 17 * * 1-5'
  workflow_dispatch: # Ручной запуск через GitHub UI

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch prices from Yahoo Finance
        run: |
          python3 << 'SCRIPT'
          import json, urllib.request, os
          from datetime import datetime, timezone

          TICKERS = {"SWRD": "SWRD.L", "EIMI": "EIMI.L", "USSC": "USSC.L"}
          prices = {}

          for etf, symbol in TICKERS.items():
              url = f"https://query1.finance.yahoo.com/v8/finance/chart/{symbol}?interval=1d&range=1d"
              req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
              try:
                  with urllib.request.urlopen(req, timeout=15) as resp:
                      data = json.loads(resp.read().decode())
                  price = data["chart"]["result"][0]["meta"]["regularMarketPrice"]
                  prices[etf] = round(price, 4)
                  print(f"  {etf}: ${prices[etf]}")
              except Exception as e:
                  print(f"  {etf}: FAILED ({e})")

          if not prices:
              print("No prices fetched, skipping update")
              exit(1)

          now = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          prices_data = {**prices, "as_of": now, "source": "yahoo_finance"}

          # prices.json
          with open("data/prices.json", "w") as f:
              json.dump(prices_data, f, indent=2)
          print(f"prices.json updated ({now})")

          # prices.js
          with open("data/prices.js", "w") as f:
              f.write(f"// Auto-generated by GitHub Actions\nwindow.__LIVE_PRICES__ = {json.dumps(prices_data)};\n")
          print("prices.js updated")

          # portfolio.json — update prices block
          try:
              with open("data/portfolio.json", "r") as f:
                  portfolio = json.load(f)
              for etf, price in prices.items():
                  portfolio["prices"][etf] = price
              portfolio["prices"]["as_of"] = now[:10]
              with open("data/portfolio.json", "w") as f:
                  json.dump(portfolio, f, indent=2, ensure_ascii=False)
              print("portfolio.json updated")
          except Exception as e:
              print(f"portfolio.json skip: {e}")
          SCRIPT

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices.json data/prices.js data/portfolio.json
          if git diff --cached --quiet; then
            echo "No price changes"
          else
            git commit -m "auto: update ETF prices $(date -u +%Y-%m-%d)"
            git push
          fi
